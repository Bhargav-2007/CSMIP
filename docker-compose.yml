services:
  db:
    image: postgres:16-alpine
    container_name: csmip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: csmip_db
      POSTGRES_USER: csmip_user
      POSTGRES_PASSWORD: csmip_password
    ports:
      - "5432:5432"
    volumes:
      - csmip_postgres_data:/var/lib/postgresql/data

volumes:
  csmip_postgres_data: